<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" id="stylesheet" media="screen" href="../../../public/dist/bds/latest/bds.min.css" />
    <title>bc-avatar</title>
  </head>
  <body class="bc-bg-brand-primary-pair-01-00">
    <div class="bc-container">
      <div class="bc-row bc-my-3">
        <h1>Avatar</h1>
      </div>
      <div class="bc-row bc-my-3">
        <div class="bc-col-xs-3 bc-col-sm-3 bc-col-md-2 bc-col-lg-2">
          <button class="bc-button-primary bc-button-small" id="styleLight" value="light" aria-label="" bc-button="" tabindex="0">
            Light
          </button>
        </div>
        <div class="bc-col-xs-3 bc-col-sm-3 bc-col-md-2 bc-col-lg-2">
          <button class="bc-button-primary bc-button-small" id="styleDark" value="dark" aria-label="" bc-button="" tabindex="0">
            Dark
          </button>
        </div>
      </div>
      <div class="bc-row bc-mt-5">
        <div class="bc-col-xs-12 bc-col-sm-12 bc-col-md-12 bc-col-lg-6">
          <h3>Imagen default cuando no tiene src</h3>
          <div class="bc-row bc-border bc-border-2 bc-p-2 bc-m-2">
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Tiny</label><br />
              <img class="bc-avatar bc-avatar-tiny" size="tiny" src="" alt="Avatar" id="avatar" />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Small</label><br />
              <img class="bc-avatar bc-avatar-small" size="small" src="" alt="Avatar" />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Medium</label><br />
              <img class="bc-avatar bc-avatar-medium" size="medium" src="" alt="Avatar" />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Large</label><br />
              <img class="bc-avatar bc-avatar-large" size="large" src="" alt="Avatar" />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>X-Large</label><br />
              <img class="bc-avatar bc-avatar-xlarge" size="xlarge" src="" alt="Avatar" />
            </div>
          </div>
        </div>
        <div class="bc-col-xs-12 bc-col-sm-12 bc-col-md-12 bc-col-lg-6">
          <h3>Icono</h3>
          <div class="bc-row bc-border bc-border-2 bc-p-2 bc-m-2">
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Tiny</label><br />
              <div class="bc-avatar" icon="address-book" size="tiny"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Small</label><br />
              <div class="bc-avatar" icon="address-book" size="small"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Medium</label><br />
              <div class="bc-avatar" icon="address-book" size="medium"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Large</label><br />
              <div class="bc-avatar" icon="address-book" size="large"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>X-Large</label><br />
              <div class="bc-avatar" icon="address-book" size="xlarge"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="bc-row">
        <div class="bc-col-xs-12 bc-col-sm-12 bc-col-md-12 bc-col-lg-6">
          <h3>Fotografía</h3>
          <div class="bc-row bc-border bc-border-2 bc-p-2 bc-m-2">
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Tiny</label><br />
              <img
                class="bc-avatar bc-avatar-tiny" size='tiny'
                src="https://images.unsplash.com/profile-1619559142670-fcd58dab16a9image?ixlib=rb-4.0.3&crop=faces&fit=crop&w=128&h=128"
                alt="Avatar"
              />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Small</label><br />
              <img
                class="bc-avatar bc-avatar-small"
                src="https://images.unsplash.com/profile-1619559142670-fcd58dab16a9image?ixlib=rb-4.0.3&crop=faces&fit=crop&w=128&h=128"
                alt="Avatar"
              />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Medium</label><br />
              <img
                class="bc-avatar bc-avatar-medium" size='medium'
                src="https://images.unsplash.com/profile-1619559142670-fcd58dab16a9image?ixlib=rb-4.0.3&crop=faces&fit=crop&w=128&h=128"
                alt="Avatar"
              />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Large</label><br />
              <img
                class="bc-avatar bc-avatar-large" size='large'
                src="https://images.unsplash.com/profile-1619559142670-fcd58dab16a9image?ixlib=rb-4.0.3&crop=faces&fit=crop&w=128&h=128"
                alt="Avatar"
              />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>X-Large</label><br />
              <img
                class="bc-avatar bc-avatar-xlarge" size='xlarge'
                src="https://images.unsplash.com/profile-1619559142670-fcd58dab16a9image?ixlib=rb-4.0.3&crop=faces&fit=crop&w=128&h=128"
                alt="Avatar"
              />
            </div>
          </div>
        </div>
        <div class="bc-col-xs-12 bc-col-sm-12 bc-col-md-12 bc-col-lg-6">
          <h3>Illustraciones Banco</h3>
          <div class="bc-row bc-border bc-border-2 bc-p-2 bc-m-2">
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Tiny</label><br />
              <div class="bc-avatar" size="tiny" illustration="il-avatar-old-man" alt="Avatar tiny"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Small</label><br />
              <div class="bc-avatar" size="small" illustration="il-avatar-old-man" alt="Avatar small"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Medium</label><br />
              <div class="bc-avatar" size="medium" illustration="il-avatar-old-man"  alt="Avatar medium"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Large</label><br />
              <div class="bc-avatar" size="large" illustration="il-avatar-old-man" alt="Avatar large"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>X-Large</label><br />
              <div class="bc-avatar" size="xlarge" illustration="il-avatar-old-man" alt="Avatar xlarge"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="bc-row bc-mb-5">
        <div class="bc-col-xs-12 bc-col-sm-12 bc-col-md-12 bc-col-lg-6">
          <h3>Avatar accionable</h3>
          <div class="bc-row bc-border bc-border-2 bc-p-2 bc-m-2">
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Tiny</label><br />
              <div class="bc-avatar" size="tiny" isActionable="true"  illustration="il-activation-face-id" alt="Avatar tiny" focus="true"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Small</label><br />
              <div class="bc-avatar" size="small" isActionable="true" alt="Avatar small" focus="true"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Medium</label><br />
              <img
              class="bc-avatar bc-avatar-medium" isActionable="true" size="medium" focus="true"
              src="https://images.unsplash.com/profile-1619559142670-fcd58dab16a9image?ixlib=rb-4.0.3&crop=faces&fit=crop&w=128&h=128"
              alt="Avatar"
              focus="true"
              aria-label="Avatar"
            />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Large</label><br />
              <div class="bc-avatar" size="large" isActionable="true" initials="mm" initialBg="flamenco" alt="Avatar large" focus="true"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>X-Large</label><br />
              <div class="bc-avatar" size="xlarge" isActionable="true" icon="address-book" alt="Avatar xlarge" focus="true"></div>
            </div>
          </div>
        </div>
        <div class="bc-col-xs-12 bc-col-sm-12 bc-col-md-12 bc-col-lg-6">
          <h3>Avatar con tooltip</h3>
          <div class="bc-row bc-border bc-border-2 bc-p-2 bc-m-2">
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">Tiny</label><br />
              <img class="bc-avatar bc-avatar-tiny bc-tooltip" src="" size="tiny" alt="Avatar" tooltip="Avatar Tiny Texto" />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">Small</label><br />
              <div class="bc-avatar" icon="address-book" size="small" tooltip="Avatar Small Texto"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">Medium</label><br />
              <img
                class="bc-avatar bc-avatar-medium"
                src="https://images.unsplash.com/profile-1619559142670-fcd58dab16a9image?ixlib=rb-4.0.3&crop=faces&fit=crop&w=128&h=128"
                alt="Avatar"
                tooltip="Avatar Medium Texto"
              />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">Large</label><br />
              <div
              class="bc-avatar"
              size="large"
              illustration="il-avatar-old-man"
              alt="Avatar medium"
              tooltip="Avatar Large Texto"
              ></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">X-Large</label><br />
              <div class="bc-avatar bc-tooltip" icon="address-book" size="xlarge" tooltip="Avatar x-Large Texto"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="bc-row bc-mb-5">
        <div class="bc-col-xs-12 bc-col-sm-12 bc-col-md-12 bc-col-lg-6">
          <h3>Avatar con badge </h3>
          <div class="bc-row bc-border bc-border-2 bc-p-2 bc-m-2">
            <div class="bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">Tiny</label><br />
                <img class="bc-avatar bc-avatar-tiny" size="tiny" src="" alt="Avatar" showBadge="true" id="avatar" aria-label="Avatar" />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">Small</label><br />
              <div class="bc-avatar" icon="address-book" size="small" showBadge="true" initials="m" initialBg="orquidea" aria-label="Avatar"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">Medium</label><br />
                <img
                  class="bc-avatar bc-avatar-medium"
                  src="https://images.unsplash.com/profile-1619559142670-fcd58dab16a9image?ixlib=rb-4.0.3&crop=faces&fit=crop&w=128&h=128"
                  showBadge="true"
                  alt="Avatar"
                  aria-label="Avatar"
                />
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">Large</label><br />
              <div class="bc-avatar" size="large" illustration="il-avatar-old-man" showBadge="true" alt="Avatar large"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label class="bc-lh-lg">X-Large</label><br />
              <div class="bc-avatar" icon="address-book" size="xlarge" showBadge="true" aria-label="Avatar"></div>
            </div>
          </div>
        </div>
        <div class="bc-col-xs-12 bc-col-sm-12 bc-col-md-12 bc-col-lg-6">
          <h3>Initials</h3>
          <div class="bc-row bc-border bc-border-2 bc-p-2 bc-m-2">
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Tiny</label><br />
              <div class="bc-avatar" initials="Ma" initialBg="macondo" size="tiny"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Small</label><br />
              <div class="bc-avatar" initials="m" initialBg="macondo" size="small"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Medium</label><br />
              <div class="bc-avatar" initials="Mm" initialBg="macondo" size="medium"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>Large</label><br />
              <div class="bc-avatar" initials="Mm" initialBg="macondo" size="large"></div>
            </div>
            <div class="bc-col-xs-6 bc-col-sm-4 bc-col-md-2 bc-col-lg-2">
              <label>X-Large</label><br />
              <div class="bc-avatar" initials="Mm" initialBg="macondo" size="xlarge"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
 
    
    <script src="../../../public/dist/bds/latest/bds.min.js"></script>
    <script>
      const initThemes = () => {
        const handleLoad = () => {
          let light = document.getElementById('styleLight');
          let dark = document.getElementById('styleDark');
          light.addEventListener('click', handleClick);
          dark.addEventListener('click', handleClick);
        };

        const handleClick = (event) => {
          if (event.target.value === 'light') {
            document.getElementById('stylesheet').href = '../../../public/dist/bds/latest/bds.min.css';
          } else {
            document.getElementById('stylesheet').href = '../../../public/dist/bds/latest/bds-black.min.css';
          }
        };

        window.addEventListener('load', handleLoad);
      };

      initThemes();
      BcAvatarBehavior.setUpAll();
      BcTooltipBehavior.setUpAll();
    </script>
  </body>
</html>
